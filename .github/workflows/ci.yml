name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Lint job
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: |
          npm run format:check || {
            echo ""
            echo "❌ Prettier found formatting issues. Fix them locally with:"
            echo "   npm run format"
            echo "   git add -A && git commit -m 'chore: format with Prettier' && git push"
            echo ""
            echo "Files with issues:"
            npx prettier --list-different .
            exit 1
          }

  # Type check job
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      - name: Check TypeScript version
        run: npx tsc --version

      - name: Type check MCP server
        run: cd mcp-server && npm run build

  # Build job
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      - name: Build MCP server
        run: npm run build:mcp

      - name: Verify build output
        run: |
          if [ ! -d "mcp-server/dist" ]; then
            echo "ERROR: dist directory not found"
            exit 1
          fi
          if [ ! -f "mcp-server/dist/index.js" ]; then
            echo "ERROR: index.js not found in dist"
            exit 1
          fi

  # Test job (if tests added later)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests configured yet"

  # Security scan job
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # Matrix build for multiple Node versions
  matrix-build:
    name: Build on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      - name: Build MCP server
        run: npm run build:mcp
